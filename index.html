<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Smart Camera - Hand Tracking & Voice</title>
    
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/control_utils/control_utils.js" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/drawing_utils/drawing_utils.js" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands/hands.js" crossorigin="anonymous"></script>

    <style>
        body {
            margin: 0;
            padding: 0;
            font-family: 'Courier New', Courier, monospace;
            background-color: #1e1e1e;
            color: #fff;
            display: flex;
            height: 100vh;
            overflow: hidden;
        }

        .container {
            display: flex;
            width: 100%;
            height: 100%;
        }

        .camera-section {
            flex: 1;
            display: flex;
            justify-content: center;
            align-items: center;
            background-color: #000;
            position: relative;
        }

        #input_video {
            display: none; 
        }

        #output_canvas {
            width: 100%;
            max-width: 800px;
            height: auto;
            border: 2px solid #333;
            border-radius: 10px;
            transform: scaleX(-1);
        }

        .log-section {
            flex: 1;
            background-color: #0d1117;
            padding: 20px;
            border-left: 2px solid #30363d;
            overflow-y: auto;
        }

        h2 {
            color: #58a6ff;
            margin-top: 0;
            border-bottom: 1px solid #30363d;
            padding-bottom: 10px;
        }

        #log_data {
            color: #7ee787;
            font-size: 14px;
            white-space: pre-wrap;
            line-height: 1.5;
        }

        #loading {
            position: absolute;
            color: white;
            font-size: 20px;
            background: rgba(0,0,0,0.7);
            padding: 10px 20px;
            border-radius: 5px;
        }
    </style>
</head>
<body>

    <div class="container">
        <div class="camera-section">
            <div id="loading">Memuat Model AI Kamera... Izinkan akses webcam.</div>
            <video id="input_video"></video>
            <canvas id="output_canvas" width="640" height="480"></canvas>
        </div>

        <div class="log-section">
            <h2>RyzzCV Project</h2>
            <div id="log_data">Menunggu tangan terdeteksi...</div>
        </div>
    </div>

    <script>
        const videoElement = document.getElementById('input_video');
        const canvasElement = document.getElementById('output_canvas');
        const canvasCtx = canvasElement.getContext('2d');
        const logElement = document.getElementById('log_data');
        const loadingElement = document.getElementById('loading');

        // Variabel pembantu untuk mengatur delay suara agar tidak tumpang tindih
        let lastSpokenText = "";
        let speechCooldown = false;

        // Fungsi untuk berbicara menggunakan Web Speech API
        function speak(text) {
            // Jika teks yang sama baru saja diucapkan atau sedang ada cooldown, lewati
            if (speechCooldown && lastSpokenText === text) return;

            // Stop suara yang sedang berjalan jika ingin mengganti ke suara baru
            window.speechSynthesis.cancel();

            const utterance = new SpeechSynthesisUtterance(text);
            utterance.lang = 'id-ID'; // Menggunakan aksen bahasa Indonesia
            utterance.rate = 1.0;     // Kecepatan normal

            utterance.onend = () => {
                // Berikan jeda 1,5 detik setelah selesai bicara sebelum bisa memicu suara yang sama lagi
                setTimeout(() => {
                    speechCooldown = false;
                }, 1500);
            };

            speechCooldown = true;
            lastSpokenText = text;
            window.speechSynthesis.speak(utterance);
        }

        function onResults(results) {
            loadingElement.style.display = 'none';

            canvasCtx.save();
            canvasCtx.clearRect(0, 0, canvasElement.width, canvasElement.height);
            canvasCtx.drawImage(results.image, 0, 0, canvasElement.width, canvasElement.height);

            if (results.multiHandLandmarks && results.multiHandLandmarks.length > 0) {
                let logText = "";
                
                for (let i = 0; i < results.multiHandLandmarks.length; i++) {
                    const landmarks = results.multiHandLandmarks[i];
                    
                    drawConnectors(canvasCtx, landmarks, HAND_CONNECTIONS, {color: '#FFFFFF', lineWidth: 4});
                    drawLandmarks(canvasCtx, landmarks, {color: '#FF0000', lineWidth: 2, radius: 5});

                    // Logika Deteksi Jari Terbuka/Tertutup (Berdasarkan koordinat Y)
                    // Ingat: Di sistem koordinat MediaPipe, arah ATAS nilainya MENGECIL (0 di paling atas, 1 di paling bawah)
                    
                    const jempolTerbuka = landmarks[4].x < landmarks[3].x; // Estimasi jempol berdasarkan sumbu X (untuk tangan kanan standar)
                    const telunjukTerbuka = landmarks[8].y < landmarks[6].y;
                    const tengahTerbuka = landmarks[12].y < landmarks[10].y;
                    const manisTerbuka = landmarks[16].y < landmarks[14].y;
                    const kelingkingTerbuka = landmarks[20].y < landmarks[18].y;

                    let gestureDetected = "Tidak ada gesture khusus";

                    // Jalankan perintah suara sesuai kondisi jari yang diacungkan secara spesifik
                    if (telunjukTerbuka && !tengahTerbuka && !manisTerbuka && !kelingkingTerbuka) {
                        gestureDetected = "Jari Telunjuk Saja (Halo)";
                        speak("halo");
                    } 
                    else if (tengahTerbuka && !telunjukTerbuka && !manisTerbuka && !kelingkingTerbuka) {
                        gestureDetected = "Jari Tengah Saja (Fathur Rizam)";
                        speak("Fathur Rizam");
                    }
                    // Untuk jempol, karena gerakannya menyamping, terkadang butuh penyesuaian. 
                    // Di bawah ini mendeteksi jika jempol aktif namun jari lain menggenggam.
                    else if (jempolTerbuka && !telunjukTerbuka && !tengahTerbuka && !manisTerbuka && !kelingkingTerbuka) {
                        gestureDetected = "Jempol Saja (Nama Saya)";
                        speak("nama saya");
                    }

                    // Format log data ke layar
                    logText += `[ TANGAN KE-${i + 1} TERDETEKSI ]\n`;
                    logText += `> Status     : AKTIF\n`;
                    logText += `> Gesture    : ${gestureDetected}\n`;
                    logText += `> Detail Jari:\n`;
                    logText += `   - Jempol    : ${jempolTerbuka ? "ANGKAT" : "TEKUK"}\n`;
                    logText += `   - Telunjuk  : ${telunjukTerbuka ? "ANGKAT" : "TEKUK"}\n`;
                    logText += `   - Tengah    : ${tengahTerbuka ? "ANGKAT" : "TEKUK"}\n`;
                    logText += `\n`;
                }
                
                logElement.innerText = logText;
            } else {
                logElement.innerText = "> Tidak ada pergerakan tangan yang terdeteksi.\n> Menunggu input...";
            }
            canvasCtx.restore();
        }

        const hands = new Hands({locateFile: (file) => {
            return `https://cdn.jsdelivr.net/npm/@mediapipe/hands/${file}`;
        }});
        
        hands.setOptions({
            maxNumHands: 1, // Diubah ke 1 agar fokus deteksi suara dari satu tangan utama tidak bentrok
            modelComplexity: 1,
            minDetectionConfidence: 0.7, // Dinaikkan sedikit agar deteksi lebih akurat dan stabil
            minTrackingConfidence: 0.7
        });
        
        hands.onResults(onResults);

        const camera = new Camera(videoElement, {
            onFrame: async () => {
                await hands.send({image: videoElement});
            },
            width: 640,
            height: 480
        });
        
        camera.start();
    </script>
</body>
</html>
